<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#9d5ff5"/>
      <stop offset="100%" stop-color="#4a1a9e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="55%">
      <stop offset="0%"   stop-color="#c084fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- rounded square background -->
  <rect width="32" height="32" rx="8" fill="#08060f"/>
  <rect width="32" height="32" rx="8" fill="url(#bg)" opacity="0.9"/>
  <rect width="32" height="32" rx="8" fill="url(#glow)"/>

  <!-- ✦ glyph -->
  <text
    x="16" y="21"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="16"
    fill="white"
    opacity="0.95"
  >✦</text>
</svg>