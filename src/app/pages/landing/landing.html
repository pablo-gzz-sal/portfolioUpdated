<div
  class="relative min-h-dvh bg-[color:var(--bg)] text-[color:var(--text)] selection:bg-white selection:text-black"
>
  <!-- primary bloom — upper left -->
  <div
    class="pointer-events-none absolute inset-0 -z-10
           bg-[radial-gradient(ellipse_55%_45%_at_15%_25%,rgba(110,35,190,0.5),transparent_70%)]"
  ></div>

  <!-- secondary bloom — lower right, much dimmer -->
  <div
    class="pointer-events-none absolute inset-0 -z-10
           bg-[radial-gradient(ellipse_40%_35%_at_85%_80%,rgba(70,15,130,0.2),transparent_65%)]"
  ></div>

  <!-- top edge bleed -->
  <div
    class="pointer-events-none absolute inset-x-0 top-0 -z-10 h-72
           bg-[radial-gradient(ellipse_50%_60%_at_50%_0%,rgba(130,55,210,0.2),transparent_75%)]"
  ></div>

  <!-- grid — fades out toward bottom -->
  <div
    class="pointer-events-none absolute inset-0 -z-10
           [background-image:linear-gradient(rgba(255,255,255,0.06)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.06)_1px,transparent_1px)]
           [background-size:48px_48px]
           [mask-image:linear-gradient(to_bottom,black_0%,black_40%,transparent_75%)]"
  ></div>


  <app-header />

  <main class="relative mx-auto w-full max-w-6xl px-4 sm:px-6 lg:px-8">
    <app-hero />
    <app-projects />
    <app-systems />
    <app-knowledge />
  </main>

  <app-footer />
</div>
