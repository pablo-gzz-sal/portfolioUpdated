<div
  class="bg-pattern-grid relative min-h-dvh bg-[color:var(--bg)] text-[color:var(--text)] selection:bg-white selection:text-black"
>
  <!-- primary bloom — upper centre -->
  <div
    class="pointer-events-none absolute inset-0 -z-10
           bg-[radial-gradient(ellipse_60%_50%_at_50%_0%,rgba(110,35,190,0.45),transparent_70%)]"
  ></div>

  <!-- secondary bloom — lower right -->
  <div
    class="pointer-events-none absolute inset-0 -z-10
           bg-[radial-gradient(ellipse_40%_35%_at_85%_80%,rgba(70,15,130,0.18),transparent_65%)]"
  ></div>

  <!-- grid -->
  <div
    class="pointer-events-none absolute inset-0 -z-10
           [background-image:linear-gradient(rgba(255,255,255,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.05)_1px,transparent_1px)]
           [background-size:48px_48px]
           [mask-image:linear-gradient(to_bottom,black_0%,black_35%,transparent_68%)]"
  ></div>
  <main class="relative mx-auto w-full max-w-6xl sm:px-6 lg:px-8">

    <app-hero />
    <app-projects />

    <!-- systems + knowledge side-by-side on lg screens -->
    <div class="grid gap-0 lg:grid-cols-2 lg:gap-10">
      <app-systems />
      <app-knowledge />
    </div>

    <section id="contact" class="pt-16 px-4 lg:px-4 sm:pt-20">
      <div
        class="relative overflow-hidden rounded-[2rem] border border-[var(--border)] bg-[var(--surface)] p-8 sm:p-10"
      >
        <div
          class="pointer-events-none absolute inset-0 bg-[conic-gradient(from_200deg_at_25%_90%,rgba(124,58,237,0.25),transparent_45%,rgba(124,58,237,0.1),transparent_70%)]"
        ></div>

        <div class="relative flex flex-col gap-8 lg:flex-row lg:items-center lg:justify-between">
          <div class="max-w-2xl">
            <p
              class="inline-flex items-center gap-2 text-xs uppercase tracking-widest text-[color:var(--muted2)]"
            >
              <span class="h-px w-4 bg-[rgba(180,140,255,0.4)]"></span>
              Let's build
            </p>
            <h2 class="mt-3 text-3xl font-semibold leading-tight tracking-tight sm:text-4xl">
              Let's build the
              <span class="text-[color:var(--lavender)]">extraordinary</span>.
            </h2>
            <p class="mt-3 text-sm leading-7 text-[color:var(--muted)]">
              I'm open to freelance work, product collaboration, and ambitious builds that need both
              design sensitivity and engineering depth.
            </p>
          </div>

          <div class="flex shrink-0 flex-col gap-2 sm:flex-row lg:flex-col lg:w-44">
            <a
              href="mailto:pablo.gzz.sal@gmail.com"
              class="flex items-center justify-center gap-2.5 rounded-2xl border border-[var(--border)] bg-[rgba(0,0,0,0.25)] px-5 py-3.5 text-sm font-medium text-[color:var(--muted)] transition duration-300 hover:text-white hover:border-[var(--a1-ring)] hover:bg-[var(--a1-soft)]"
            >
              <svg
                class="h-4 w-4 text-[color:var(--lavender)]"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                />
              </svg>
              Email
            </a>
            <a
              href="https://www.linkedin.com/in/pablo-gonzalez-salcido-bb1a491a9/?locale=en_US"
              target="_blank"
              rel="noreferrer"
              class="flex items-center justify-center gap-2.5 rounded-2xl border border-[var(--border)] bg-[rgba(0,0,0,0.25)] px-5 py-3.5 text-sm font-medium text-[color:var(--muted)] transition duration-300 hover:text-white hover:bg-[rgba(255,255,255,0.06)]"
            >
              <svg
                class="h-4 w-4 text-[color:var(--lavender)]"
                fill="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
                />
              </svg>
              LinkedIn
            </a>
            <a
              href="https://github.com/pablo-gzz-sal"
              target="_blank"
              rel="noreferrer"
              class="flex items-center justify-center gap-2.5 rounded-2xl border border-[var(--border)] bg-[rgba(0,0,0,0.25)] px-5 py-3.5 text-sm font-medium text-[color:var(--muted)] transition duration-300 hover:text-white hover:bg-[rgba(255,255,255,0.06)]"
            >
              <svg

                fill="currentColor"

                <path

                />
              </svg>
              GitHub
            </a>
          </div>
        </div>
      </div>
    </section>

  </main>

  <app-footer />
</div>
