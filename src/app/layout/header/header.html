<header
  class="sticky top-0 z-50 bg-[rgba(8,6,15,0.60)] backdrop-blur-xl transition-all duration-300"
  [class.shadow-[0_1px_0_0_rgba(255,255,255,0.06)]]="scrolled"
>
  <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
    <!-- Logo -->
    <a href="#" class="group inline-flex items-center gap-2.5">
      <span
        class="grid h-8 w-8 place-items-center rounded-xl bg-[rgba(124,58,237,0.08)] ring-1 ring-[rgba(124,58,237,0.2)] transition duration-300 group-hover:bg-[rgba(124,58,237,0.14)] group-hover:ring-[rgba(124,58,237,0.35)] group-hover:shadow-[0_0_12px_rgba(124,58,237,0.2)]"
      >
        <span class="text-sm font-semibold text-[rgba(180,140,255,0.8)]">✦</span>
      </span>
      <span class="text-sm font-semibold tracking-wide text-[color:var(--text)]">
        Pablo Gonzalez
      </span>
    </a>

    <!-- Nav -->
    <nav class="hidden items-center gap-7 md:flex">
      <a class="text-sm text-[color:var(--muted2)] transition hover:text-white" href="#projects"
        >Projects</a
      >

      <a class="text-sm text-[color:var(--muted2)] transition hover:text-white" href="#systems"
        >Systems</a
      >

      <a class="text-sm text-[color:var(--muted2)] transition hover:text-white" href="#tech"
        >Tech</a
      >

      <a class="text-sm text-[color:var(--muted2)] transition hover:text-white" href="#contact"
        >Contact</a
      >
    </nav>

    <!-- CTA -->
    <div class="flex items-center gap-3">
      <a
        href="#contact"
        class="rounded-full bg-[rgba(100,60,200,0.35)] px-5 py-2 text-sm font-medium text-[rgba(255,255,255,0.9)] ring-1 ring-[rgba(124,58,237,0.25)] transition duration-300 hover:bg-[rgba(100,60,200,0.5)] hover:shadow-[0_0_16px_rgba(124,58,237,0.25)]"
      >
        Let's talk
      </a>
    </div>
  </div>
</header>
