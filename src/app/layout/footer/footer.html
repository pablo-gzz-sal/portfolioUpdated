<footer class="mt-24 border-t border-[rgba(255,255,255,0.06)]">
  <!-- soft violet glow bleeding up from the bottom -->
  <div
    class="pointer-events-none absolute inset-x-0 bottom-0 h-48 bg-[radial-gradient(ellipse_60%_50%_at_50%_100%,rgba(100,50,180,0.12),transparent_70%)]"
  ></div>

  <div class="mx-auto max-w-6xl px-4 py-10 sm:px-6 lg:px-8">
    <!-- top row -->
    <div class="flex flex-col gap-6 sm:flex-row sm:items-center sm:justify-between">
      <!-- brand -->
      <a href="#" class="group inline-flex items-center gap-2.5">
        <span
          class="grid h-7 w-7 place-items-center rounded-lg bg-[rgba(124,58,237,0.08)] ring-1 ring-[rgba(124,58,237,0.2)] transition duration-300 group-hover:ring-[rgba(124,58,237,0.35)]"
        >
          <span class="text-xs font-semibold text-[rgba(180,140,255,0.8)]">✦</span>
        </span>
        <span class="text-sm font-semibold text-[color:var(--muted)]">Pablo Gonzalez</span>
      </a>

      <!-- nav links -->
      <nav class="flex flex-wrap gap-5">
        <a class="text-sm text-[color:var(--muted2)] transition hover:text-white" href="#projects"
          >Projects</a
        >
        <a class="text-sm text-[color:var(--muted2)] transition hover:text-white" href="#systems"
          >Systems</a
        >
        <a class="text-sm text-[color:var(--muted2)] transition hover:text-white" href="#tech"
          >Tech</a
        >
        <a class="text-sm text-[color:var(--muted2)] transition hover:text-white" href="#contact"
          >Contact</a
        >
      </nav>
    </div>

    <!-- divider -->
    <div class="my-6 h-px bg-[rgba(255,255,255,0.05)]"></div>

    <!-- bottom row -->
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <p class="text-xs text-[color:var(--muted2)]">
        © {{ year }} Pablo Gonzalez. All rights reserved.
      </p>

      <!-- social icons -->
      <div class="flex items-center gap-3">
        <a
          href="https://github.com"
          target="_blank"
          class="grid h-8 w-8 place-items-center rounded-lg bg-[rgba(255,255,255,0.04)] ring-1 ring-[rgba(255,255,255,0.08)] text-[color:var(--muted2)] transition duration-300 hover:bg-[rgba(255,255,255,0.08)] hover:text-white"
          aria-label="GitHub"
        >
          <!-- github -->
          <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.942.359.31.678.921.678 1.856 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
            />
          </svg>
        </a>

        <a
          href="https://linkedin.com"
          target="_blank"
          class="grid h-8 w-8 place-items-center rounded-lg bg-[rgba(255,255,255,0.04)] ring-1 ring-[rgba(255,255,255,0.08)] text-[color:var(--muted2)] transition duration-300 hover:bg-[rgba(255,255,255,0.08)] hover:text-white"
          aria-label="LinkedIn"
        >
          <!-- linkedin -->
          <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
            />
          </svg>
        </a>

        <a
          href="mailto:pablo.gzz.sal@gmail.com"
          class="grid h-8 w-8 place-items-center rounded-lg bg-[rgba(255,255,255,0.04)] ring-1 ring-[rgba(255,255,255,0.08)] text-[color:var(--muted2)] transition duration-300 hover:bg-[rgba(255,255,255,0.08)] hover:text-white"
          aria-label="Email"
        >
          <svg
            class="h-4 w-4"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"
            />

        </a>
      </div>
    </div>
  </div>
</footer>
