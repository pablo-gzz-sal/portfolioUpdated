<article
  class="group relative overflow-hidden rounded-2xl p-px
         bg-[rgba(255,255,255,0.04)]
         transition duration-300
         hover:bg-[rgba(255,255,255,0.06)]"
>

  <!-- animated border gradient on hover -->
  <div
    class="pointer-events-none absolute inset-0 rounded-2xl opacity-0 transition duration-500 group-hover:opacity-100
           bg-[conic-gradient(from_180deg_at_50%_50%,rgba(124,58,237,0.4),rgba(255,255,255,0.06),rgba(124,58,237,0.4))]"
  ></div>

  <!-- inner panel -->
  <div class="relative rounded-[15px] bg-[#0b0912] p-6">

    <!-- corner glow -->
    <div
      class="pointer-events-none absolute -top-12 -right-12 h-36 w-36 rounded-full blur-2xl
             opacity-0 transition duration-500 group-hover:opacity-100
             bg-[radial-gradient(circle,rgba(124,58,237,0.3),transparent_65%)]"
    ></div>

    <!-- top row: title + badge -->
    <div class="flex items-start justify-between gap-4">
      <div>
        <h3 class="text-sm font-semibold tracking-tight text-[color:var(--text)]">
          {{ project.title }}
        </h3>
        <p class="mt-1.5 text-sm leading-relaxed text-[color:var(--muted2)]">
          {{ project.description }}
        </p>
      </div>

      @if (project.highlight) {
        <span
          class="shrink-0 rounded-full px-2.5 py-1 text-xs
                 bg-[rgba(124,58,237,0.12)] ring-1 ring-[rgba(124,58,237,0.25)]
                 text-[rgba(180,140,255,0.9)]"
        >
          {{ project.highlight }}
        </span>
      }
    </div>

    <!-- tags -->
    @if (project.tags?.length) {
      <div class="mt-4 flex flex-wrap gap-1.5">
        @for (t of project.tags; track t) {
          <span
            class="rounded-md px-2.5 py-1 text-xs
                   bg-[rgba(255,255,255,0.04)] ring-1 ring-[rgba(255,255,255,0.08)]
                   text-[color:var(--muted2)]"
          >
            {{ t }}
          </span>
        }
      </div>
    }

    <!-- divider -->
    @if (project.links?.length) {
      <div class="my-4 h-px bg-[rgba(255,255,255,0.05)]"></div>
    }

    <!-- links -->
    @if (project.links?.length) {
      <div class="flex flex-wrap gap-4">
        @for (l of project.links; track l.label) {
         <a 
            class="group/link inline-flex items-center gap-1.5 text-xs text-[color:var(--muted2)]
                   transition duration-200 hover:text-white"
            [href]="l.href"
            target="_blank"
            rel="noreferrer"
          >
            {{ l.label }}
            <svg
              class="h-3 w-3 translate-x-0 translate-y-0 opacity-50 transition duration-200
                     group-hover/link:translate-x-0.5 group-hover/link:-translate-y-0.5 group-hover/link:opacity-100"
              fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 19.5l15-15m0 0H8.25m11.25 0v11.25"/>
            </svg>
          </a>
        }
      </div>
    }

  </div>
</article>
