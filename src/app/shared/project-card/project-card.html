<article
  class="group relative rounded-2xl border border-[color:var(--border)] bg-[color:var(--surface)] p-6 transition duration-200 hover:bg-[color:var(--surface2)] hover:shadow-[0_0_0_1px_rgba(255,255,255,0.10),0_20px_80px_-30px_rgba(124,58,237,0.55)]"
>
  <!-- hover ring -->
  <div
    class="pointer-events-none absolute inset-0 rounded-2xl opacity-0 transition duration-200 group-hover:opacity-100 ring-1 ring-[color:rgba(255,255,255,0.12)]"
  ></div>

  <!-- optional corner glow -->
  <div
    class="pointer-events-none absolute -top-10 -right-10 h-40 w-40 rounded-full blur-3xl opacity-0 transition group-hover:opacity-100 bg-[radial-gradient(circle_at_center,rgba(124,58,237,0.55),transparent_60%)]"
  ></div>

  <!-- content -->
  <div class="flex items-start justify-between gap-4">
    <div>
      <h3 class="text-base font-semibold tracking-tight text-[color:var(--text)]">
        {{ project.title }}
      </h3>
      <p class="mt-2 text-sm leading-relaxed text-[color:var(--muted)]">
        {{ project.description }}
      </p>
    </div>

    @if (project.highlight) {
      <span
        class="shrink-0 rounded-full border border-[color:var(--border)] bg-[color:rgba(0,0,0,0.20)] px-3 py-1 text-xs text-[color:var(--muted)]"
      >
        {{ project.highlight }}
      </span>
    }
  </div>

  <div class="mt-4 flex flex-wrap gap-2">
    @for (t of project.tags; track t) {
      <span
        class="rounded-full border border-[color:var(--border)] bg-[color:rgba(0,0,0,0.18)] px-3 py-1 text-xs text-[color:var(--muted)]"
      >
        {{ t }}
      </span>
    }
  </div>

  @if (project.links?.length) {
    <div class="mt-5 flex flex-wrap gap-3">
      @for (l of project.links; track l.label) {
        <a
          class="text-sm text-[color:var(--text)] underline underline-offset-4 decoration-[color:rgba(255,255,255,0.22)] hover:decoration-[color:rgba(255,255,255,0.55)]"
          [href]="l.href"
          target="_blank"
          rel="noreferrer"
        >
          {{ l.label }}
        </a>
      }
    </div>
  }

  <!-- subtle always-present edge (optional; keeps depth even when not hovering) -->
  <div
    class="pointer-events-none absolute inset-0 rounded-2xl ring-1 ring-[color:rgba(255,255,255,0.06)]"
  ></div>
</article>
