<section id="projects" class="py-12 sm:py-16">
  <div class="flex items-end justify-between gap-6">
    <div>
      <p class="text-xs uppercase tracking-widest text-[color:var(--muted2)]">Projects</p>

      <h2 class="mt-2 text-2xl font-semibold tracking-tight sm:text-3xl">
        Selected work
      </h2>

      <p class="mt-2 max-w-2xl text-sm text-[color:var(--muted)]">
        A few pieces that reflect my recent focus: product UI, backend integrations, and clean architectures.
      </p>

      <!-- subtle accent line (optional but looks premium) -->
      <div class="mt-6 h-px w-24 bg-[linear-gradient(90deg,var(--a2),transparent)] opacity-60"></div>
    </div>
  </div>

  <div class="mt-8 grid gap-4 sm:grid-cols-2">
    @for (p of projects; track p.id) {
      <app-project-card [project]="p" />
    }
  </div>
</section>
