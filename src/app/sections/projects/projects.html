<section id="projects" class="py-16 sm:py-24">

  <!-- section header -->
  <div class="flex items-end justify-between gap-6">
    <div>
      <p class="inline-flex items-center gap-2 text-xs uppercase tracking-widest text-[color:var(--muted2)]">
        <span class="h-px w-4 bg-[rgba(180,140,255,0.4)]"></span>
        Projects
      </p>

      <h2 class="mt-3 text-2xl font-semibold tracking-tight sm:text-3xl">
        Selected work
      </h2>

      <p class="mt-2 max-w-xl text-sm leading-relaxed text-[color:var(--muted2)]">
        A few pieces that reflect my recent focus: product UI, backend integrations, and clean architectures.
      </p>
    </div>
  </div>

  <!-- grid -->
  <div class="mt-10 grid gap-3 sm:grid-cols-2">
    @for (p of projects; track p.id) {
      <app-project-card [project]="p" [routerLink]="['/projects', p.id]" class="cursor-pointer" />
    }
  </div>

</section>
