<section id="tech" class="py-16 px-4 lg:px-0 sm:py-24">

  <!-- header -->
  <p class="inline-flex items-center gap-2 text-xs uppercase tracking-widest text-[color:var(--muted2)]">
    <span class="h-px w-4 bg-[color:var(--lavender-line)]"></span>
    Technologies
  </p>

  <div class="mt-3 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
    <h2 class="text-2xl font-semibold tracking-tight sm:text-3xl">What I work with</h2>
    <p class="max-w-sm text-sm leading-relaxed text-[color:var(--muted2)]">
      Tools I'm confident shipping production code with — frontend to infra.
    </p>
  </div>

  <!-- tech grid -->
  <div class="mt-8 grid gap-2 sm:grid-cols-2 lg:grid-cols-3">
    @for (g of groups; track g.title) {

      <div
        class="group relative overflow-hidden rounded-2xl p-px
               bg-[var(--surface)] transition duration-300
               hover:bg-[var(--surface2)]"
      >
        <!-- animated conic border on hover -->
        <div
          class="pointer-events-none absolute inset-0 rounded-2xl opacity-0 transition duration-500 group-hover:opacity-100
                 bg-[conic-gradient(from_var(--angle,180deg)_at_50%_50%,var(--a1-ring),rgba(255,255,255,0.04),var(--a1-ring))]"
        ></div>

        <div class="relative flex h-full flex-col rounded-[15px] bg-[var(--bg-alt)] p-5">

          <!-- corner glow -->
          <div
            class="pointer-events-none absolute -top-10 -right-10 h-32 w-32 rounded-full blur-2xl
                   opacity-0 transition duration-500 group-hover:opacity-100
                   bg-[radial-gradient(circle,var(--a1-glow),transparent_65%)]"
          ></div>

          <!-- category header -->
          <div class="flex items-center gap-2.5">
            <span
              class="grid h-6 w-6 shrink-0 place-items-center rounded-lg text-xs
                     bg-[var(--a1-soft)] ring-1 ring-[var(--a1-ring)]"
            >
              {{ g.icon }}
            </span>
            <h3 class="text-xs font-semibold uppercase tracking-widest text-[color:var(--lavender)]">
              {{ g.title }}
            </h3>
          </div>

          <!-- badges -->
          <div class="mt-4 flex flex-wrap gap-1.5">
            @for (t of g.items; track t) {
              <span
                class="rounded-md px-2.5 py-1 text-xs transition duration-200
                       bg-[var(--surface)] ring-1 ring-[var(--border)]
                       text-[color:var(--muted2)]
                       hover:text-[color:var(--text)] hover:bg-[var(--surface2)] hover:ring-[var(--border2)]
                       cursor-default"
              >{{ t }}</span>
            }
          </div>

        </div>
      </div>

    }
  </div>

</section>
