<section id="tech" class="py-16 px-4 lg:px-4 sm:py-24">

  <!-- header -->
  <p class="inline-flex items-center gap-2 text-xs uppercase tracking-widest text-[color:var(--muted2)]">
    <span class="h-px w-4 bg-[rgba(180,140,255,0.4)]"></span>
    Technologies
  </p>

  <div class="mt-3 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
    <h2 class="text-2xl font-semibold tracking-tight sm:text-3xl">What I work with</h2>
    <p class="max-w-xl text-sm leading-relaxed text-[color:var(--muted2)]">
      Tools I'm confident shipping production code with — from frontend to backend and infra.
    </p>
  </div>

  <!-- tech grid -->
  <div class="mt-10 grid gap-3 sm:grid-cols-2">
    @for (g of groups; track g.title) {

      <div
        class="group relative overflow-hidden rounded-2xl p-px
               bg-[rgba(255,255,255,0.04)] transition duration-300
               hover:bg-[rgba(255,255,255,0.06)]"
      >
        <!-- border glow -->
        <div
          class="pointer-events-none absolute inset-0 rounded-2xl opacity-0 transition duration-500 group-hover:opacity-100
                 bg-[conic-gradient(from_180deg_at_50%_50%,rgba(124,58,237,0.3),rgba(255,255,255,0.04),rgba(124,58,237,0.3))]"
        ></div>

        <div class="relative rounded-[15px] bg-[#0b0912] p-6">

          <!-- corner glow -->
          <div
            class="pointer-events-none absolute -top-8 -right-8 h-28 w-28 rounded-full blur-2xl
                   opacity-0 transition duration-500 group-hover:opacity-100
                   bg-[radial-gradient(circle,rgba(124,58,237,0.2),transparent_65%)]"
          ></div>

          <h3 class="text-xs font-semibold uppercase tracking-widest text-[rgba(180,140,255,0.7)]">
            {{ g.title }}
          </h3>

          <div class="mt-4 flex flex-wrap gap-1.5">
            @for (t of g.items; track t) {
              <app-tech-badge [label]="t" />
            }
          </div>
        </div>
      </div>

    }
  </div>

</section>
